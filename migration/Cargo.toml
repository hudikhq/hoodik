[package]
name = "migration"
version = "1.1.0"
edition = "2021"
rust-version = "1.91"
publish = false
authors = ["Tibor Hudik <hello@hudik.eu>"]
readme = "README.md"
license-file = "../LICENSE.md"
description = "Database migrations, mostly auto-generated by sea-orm"

[lib]
name = "migration"
path = "src/lib.rs"

[[bin]]
name = "migration"
path = "src/main.rs"

[dependencies]
async-std = { workspace = true }

config = { path = "../config" }

sea-orm-migration = { workspace = true }
