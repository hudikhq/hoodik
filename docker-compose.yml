---
version: "2"

services:
  postgres:
    image: bitnami/postgresql:latest
    restart: always
    hostname: postgres
    container_name: postgres
    environment:
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=postgres
      - POSTGRESQL_DATABASE=postgres
      - POSTGRESQL_WAL_LEVEL=logical
    ports:
      - "5432:5432"

  # Ephemeral Postgres for the Rust integration suite.
  # `tmpfs` keeps the data dir in RAM so the container starts in ~1s and
  # leaves no state behind between runs. Port 5433 avoids colliding with a
  # developer's local Postgres on 5432.
  postgres-test:
    image: postgres:16-alpine
    hostname: postgres-test
    container_name: postgres-test
    environment:
      POSTGRES_USER: hoodik_test
      POSTGRES_PASSWORD: hoodik_test
      POSTGRES_DB: hoodik_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hoodik_test"]
      interval: 1s
      timeout: 3s
      retries: 30
    tmpfs:
      # 4 GB is enough headroom for one full test suite run; each per-test
      # database is ~10 MB after migrations and the harness leaves them
      # behind until the container is recreated.
      - /var/lib/postgresql/data:size=4g

  minio:
    image: minio/minio:latest
    hostname: minio
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data-minio:/data

  # Creates the default bucket on first startup
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 2;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/hoodik;
      echo 'Bucket ready.';
      "

